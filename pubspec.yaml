name: all_format_media_converter
description: A production-ready Android media converter app using Flutter and FFmpeg.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  ffmpeg_kit_flutter_new: ^4.1.0
  permission_handler: ^11.0.0
  device_info_plus: ^9.0.0
  path_provider: ^2.1.3
  path: ^1.9.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  open_filex: ^4.4.0
  share_plus: ^10.0.0
  google_fonts: ^6.2.1
  android_intent_plus: ^5.0.2
  pdf: ^3.11.1
  image: ^4.2.0
  google_mobile_ads: ^7.0.0
  lucide_icons: ^0.257.0
  animations: ^2.1.2
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#7B2FF2"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
